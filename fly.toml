# Fly.io config. Change "app" to a unique name if this one is taken.
app = "site-clean6"
primary_region = "sin"   # Singapore - closest Fly region to the Philippines

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep the app always-on for real users (no cold starts).
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
