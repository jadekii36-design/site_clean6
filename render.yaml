# Render Blueprint - deploys the Django app + a managed PostgreSQL database.
# Docs: https://render.com/docs/blueprint-spec
databases:
  - name: site-clean6-db
    plan: basic-256mb
    region: oregon

services:
  - type: web
    name: site-clean6
    runtime: python
    plan: starter
    region: oregon
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application -c config/gunicorn.conf.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: site-clean6-db
          property: connectionString
      # Cloudinary (media/image uploads). Fill these in the Render dashboard.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
